<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e8c4b8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>I am 1</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <style>
    :root {
      --bg1: #f5e6dc;
      --bg2: #e8ddd4;
      --bg3: #dfe8e0;
      --glass: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.55);
      --text: #2c2c2c;
      --text2: #6b6b6b;
      --text3: #9a9a9a;
      --accent: #c4a69d;
      --blue: #4a7eb5;
      --blue-soft: #e1eef8;
      --correct: #6b9f7a;
      --wrong: #c97a7a;
      --radius: 18px;
      --radius-sm: 14px;
      --shadow: 0 8px 32px rgba(80, 60, 50, 0.08);
      --safe-b: env(safe-area-inset-bottom, 12px);
      --safe-t: env(safe-area-inset-top, 12px);
    }
    * { box-sizing: border-box; }
    [v-cloak] { display: none !important; }
    html, body { height: 100%; margin: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text);
      background: linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }
    #app { min-height: 100%; padding: var(--safe-t) 14px calc(18px + var(--safe-b)); max-width: 440px; margin: 0 auto; }
    .nav-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px 14px; font-size: 15px; color: var(--text2);
    }
    .nav-bar h1 { margin: 0; font-size: 17px; font-weight: 600; color: var(--text); }
    .nav-btn {
      border: none; background: var(--glass); backdrop-filter: blur(14px);
      border-radius: 12px; padding: 8px 12px; color: var(--text); cursor: pointer;
      box-shadow: var(--shadow); border: 1px solid var(--glass-border);
    }
    .card {
      background: var(--glass); backdrop-filter: blur(18px);
      border-radius: var(--radius); border: 1px solid var(--glass-border);
      box-shadow: var(--shadow); padding: 16px; margin-bottom: 14px;
    }
    .word-head { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
    .phon-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 10px; font-size: 14px; color: var(--text2); }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.85);
      font-size: 12px; color: var(--text2); border: 1px solid rgba(0,0,0,0.06);
    }
    .hint-text { font-size: 13px; color: var(--text3); margin-top: 12px; line-height: 1.5; }
    .choice {
      display: block; width: 100%; text-align: left; padding: 14px 14px 14px 16px;
      margin-bottom: 12px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.88); border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04); font-size: 15px; line-height: 1.45;
      color: var(--text); cursor: pointer; transition: transform 0.12s, background 0.15s;
    }
    .choice:active { transform: scale(0.98); }
    .choice .pos { font-size: 12px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
    .choice.selected { outline: 2px solid var(--blue); }
    .choice.wrong { background: rgba(201,122,122,0.12); }
    .choice.right { background: rgba(107,159,122,0.15); }
    .row-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      flex: 1; min-width: 100px; padding: 14px; border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: var(--blue-soft); color: #3a6a9a; }
    .btn-ghost { background: rgba(255,255,255,0.6); color: var(--text2); }
    .btn-dark { background: #5a6270; color: #fff; }
    .btn-success { background: rgba(107,159,122,0.25); color: #3d6b4a; }
    .btn-warn { background: rgba(212, 175, 120, 0.35); color: #6b4f2a; }
    .btn-danger-soft { background: rgba(201,122,122,0.2); color: #8a4545; }
    .fab-bottom {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(10px + var(--safe-b));
      font-size: 14px; color: var(--text3); background: transparent; border: none; padding: 8px 16px;
    }
    .toolbar-icons { display: flex; gap: 14px; align-items: center; color: var(--text2); }
    .toolbar-icons button {
      background: none; border: none; padding: 4px; font-size: 16px; color: inherit; cursor: pointer;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .tag {
      padding: 6px 12px; border-radius: 999px; font-size: 13px; cursor: pointer;
      background: #ebebf0; color: #4a4a4a;
    }
    .tag.on { background: #5e6c84; color: #fff; }
    .ex-en { font-size: 15px; line-height: 1.55; margin-bottom: 8px; }
    .ex-en em { font-style: normal; color: var(--blue); font-weight: 700; font-size: 1.08em; }
    .ex-zh { font-size: 14px; color: var(--text2); }
    .img-ph {
      width: 100%; max-height: 160px; object-fit: cover; border-radius: 12px; margin-top: 10px;
      background: linear-gradient(135deg, #e0e0e0, #f5f5f5);
    }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 13px; color: var(--text3); }
    .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; padding: 8px 0; gap: 4px; }
    .bar { flex: 1; background: linear-gradient(180deg, #ffb347, #ff9500); border-radius: 6px 6px 2px 2px; min-height: 4px; position: relative; }
    .bar.rev { background: linear-gradient(180deg, #d4a5ff, #af52de); }
    .bar-label { font-size: 10px; color: var(--text3); text-align: center; margin-top: 4px; }
    .progress-wrap { height: 8px; background: rgba(0,0,0,0.06); border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .progress-in { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #6b9f7a, #4a7eb5); transition: width 0.3s; }
    textarea.note {
      width: 100%; min-height: 88px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.08);
      padding: 10px; font-size: 14px; font-family: inherit; resize: vertical; background: rgba(255,255,255,0.9);
    }
    .fold-hd { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; cursor: pointer; font-weight: 600; color: var(--text2); }
    .fold-bd { font-size: 14px; color: var(--text); line-height: 1.55; padding-bottom: 8px; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; font-size: 12px; touch-action: pan-y; user-select: none; }
    .cal-cell { padding: 8px 0; border-radius: 10px; background: rgba(255,255,255,0.5); color: var(--text2); }
    .cal-cell.ok { background: rgba(255, 149, 0, 0.25); color: #b35a00; font-weight: 700; }
    .cal-cell.today { outline: 2px solid var(--blue); }
    .loading-dot::after { content: "…"; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 90px; z-index: 9999;
      background: rgba(40,40,40,0.92); color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 14px; max-width: 90%;
    }
    .modal-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 9000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: #fff; border-radius: var(--radius); padding: 20px; max-width: 360px; width: 100%;
      box-shadow: var(--shadow);
    }
    .spell-input {
      width: 100%; padding: 14px; font-size: 18px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.1);
      margin-top: 12px;
    }
    .small { font-size: 12px; color: var(--text3); }
    .deck-item {
      padding: 16px; border-radius: var(--radius); margin-bottom: 12px;
      background: rgba(255,255,255,0.85); border: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: center; cursor: pointer;
    }
    .deck-item:active { transform: scale(0.99); }
    .list-two { font-size: 13px; color: var(--text3); }
    @media (min-width: 480px) {
      #app { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div v-if="toast" class="toast">{{ toast }}</div>

    <teleport to="body">
      <div v-if="modalExit" class="modal-mask" @click.self="modalExitOk">
        <div class="modal">
          <p style="margin:0 0 12px;font-size:16px;line-height:1.5">{{ modalExitText }}</p>
          <button class="btn btn-primary" style="width:100%" type="button" @click="modalExitOk">好的</button>
        </div>
      </div>
    </teleport>

    <!-- HOME -->
    <template v-if="view==='home'">
      <div class="nav-bar">
        <span style="font-weight:600">I am 1</span>
        <div class="toolbar-icons">
          <button type="button" @click="view='overview'" title="概览"><i class="fa-solid fa-chart-column"></i></button>
          <button type="button" @click="view='settings'" title="设置"><i class="fa-solid fa-gear"></i></button>
        </div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600">每日签到</span>
          <button class="nav-btn" type="button" @click="doSignIn" :disabled="signedToday">
            {{ signedToday ? '今日已签' : '签到' }}
          </button>
        </div>
        <p class="small" style="margin:8px 0 0">连续 {{ streak }} 天 · {{ signQuote }}</p>
        <div class="calendar" style="margin-top:12px"
          @touchstart.passive="calTouchStart"
          @touchend.passive="calTouchEnd">
          <div v-for="d in calDays" :key="d.key" class="cal-cell" :class="{ok:d.signed,today:d.today}">{{ d.label }}</div>
        </div>
        <p class="small" style="margin-top:8px;text-align:center">共 7 天，今天在中间；向左滑查看更早一周</p>
      </div>
      <div class="card">
        <div style="font-weight:600;margin-bottom:8px">今日计划</div>
        <div class="stats-grid">
          <div><div class="stat-num">{{ todayLearned }}</div><div class="stat-label">今日学习量（学+复习）</div></div>
          <div><div class="stat-num">{{ settings.dailyGoal }}</div><div class="stat-label">每日目标（词）</div></div>
        </div>
        <div class="small" style="margin-top:8px">本周剩余 {{ weekRemain }} 词（周目标 {{ settings.weekGoal }}）</div>
        <div class="progress-wrap"><div class="progress-in" :style="{width: weekProgressPct+'%'}"></div></div>
        <p v-if="lexiconBundlesLoading" class="small" style="margin-top:10px;text-align:center">四六级词库加载中…</p>
      </div>
      <div class="row-btns">
        <button class="btn btn-primary" @click="view='decks'"><i class="fa-solid fa-book"></i> 选择词库</button>
        <button class="btn btn-ghost" @click="startSession('daily')">今日队列</button>
      </div>
      <div class="row-btns">
        <button class="btn btn-ghost" @click="view='search'"><i class="fa-solid fa-magnifying-glass"></i> 搜索</button>
        <button class="btn btn-ghost" @click="view='wrong'">错题集 <span class="small">({{ wrongList.length }})</span></button>
      </div>
      <div class="row-btns">
        <button class="btn btn-ghost" @click="startSession('notebook')">生词本学习</button>
      </div>
    </template>

    <!-- PICK PLAN -->
    <template v-if="view==='pickPlan'">
      <div class="nav-bar">
        <button class="nav-btn" type="button" @click="view='decks'"><i class="fa-solid fa-chevron-left"></i></button>
        <h1>今日选题</h1>
        <span style="width:48px"></span>
      </div>
      <p class="hint-text">按每日目标约 {{ settings.dailyGoal }} 词，组合「昨日多轮复习」「近期搜索」「词库随机」。勾选后要背的单词，再进入考核。</p>
      <div class="card">
        <input class="spell-input" v-model="pickPlanSearchQ" placeholder="在线搜索英文，加入待选表" @keyup.enter="pickPlanSearchOnline" />
        <button class="btn btn-primary" style="width:100%;margin-top:8px" type="button" @click="pickPlanSearchOnline" :disabled="pickPlanSearchLoading">
          {{ pickPlanSearchLoading ? '查询中…' : '搜索并加入列表' }}
        </button>
      </div>
      <div class="row-btns">
        <button type="button" class="btn btn-ghost" @click="togglePickAll(true)">全选</button>
        <button type="button" class="btn btn-ghost" @click="togglePickAll(false)">全不选</button>
      </div>
      <div class="card" style="overflow-x:auto;padding:8px">
        <table style="width:100%;font-size:13px;border-collapse:collapse">
          <thead>
            <tr>
              <th style="text-align:left;padding:8px;width:36px">选</th>
              <th style="text-align:left;padding:8px">来源</th>
              <th style="text-align:left;padding:8px">单词</th>
              <th style="text-align:left;padding:8px">释义摘录</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(row,idx) in pickPlanRows" :key="row.entry.word + '-' + idx" style="border-top:1px solid rgba(0,0,0,0.06)">
              <td style="padding:8px;vertical-align:top"><input type="checkbox" v-model="row.checked" /></td>
              <td style="padding:8px;vertical-align:top;color:var(--text3);white-space:nowrap">{{ row.tag }}</td>
              <td style="padding:8px;vertical-align:top;font-weight:600">{{ row.entry.word }}</td>
              <td style="padding:8px;vertical-align:top;max-width:42vw;word-break:break-word">{{ (row.entry.translation||'').split('\n')[0] }}</td>
            </tr>
          </tbody>
        </table>
        <p v-if="!pickPlanRows.length" class="hint-text">暂无候选，请换词库或完成词库加载后再试。</p>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:12px" type="button" @click="startPickedPlan">开始考核已选单词</button>
    </template>

    <!-- DECKS -->
    <template v-if="view==='decks'">
      <div class="nav-bar">
        <button class="nav-btn" type="button" @click="view='home'"><i class="fa-solid fa-chevron-left"></i></button>
        <h1>选择词库</h1>
        <span style="width:48px"></span>
      </div>
      <p class="hint-text">先选词库再学习。可加载本地 ECDICT CSV 扩充词条（下方「导入词库」）。</p>
      <div v-for="dk in deckKeys" :key="dk" class="deck-item" @click="selectDeck(dk)">
        <div>
          <div style="font-weight:600">{{ decks[dk].name }}</div>
          <div class="list-two">{{ decks[dk].desc }} · {{ deckWordCount(dk) }} 词</div>
        </div>
        <i class="fa-solid fa-chevron-right" style="color:#bbb"></i>
      </div>
      <div class="card">
        <div style="font-weight:600;margin-bottom:8px">导入 ECDICT CSV</div>
        <input type="file" accept=".csv,text/csv" @change="onCsvFile" />
        <p class="small" style="margin-top:8px">解析后合并进本地索引；当前词表 {{ lexiconSize }} 条</p>
      </div>
    </template>

    <!-- LEARN META -->
    <template v-if="view==='learn' && currentEntry">
      <div class="nav-bar">
        <button class="nav-btn" type="button" @click="confirmLeaveStudy"><i class="fa-solid fa-chevron-left"></i></button>
        <span>{{ sessionIndex + 1 }} / {{ sessionQueue.length }}</span>
        <div class="toolbar-icons">
          <button type="button" @click="toggleStar(currentEntry.word)"><i :class="isStarred(currentEntry.word)?'fa-solid fa-star':'fa-regular fa-star'"></i></button>
        </div>
      </div>
      <div class="word-head" style="text-align:center;margin-top:8px">{{ currentEntry.word }}</div>
      <div class="phon-row" style="justify-content:center">
        <button type="button" class="pill" @click="speak(currentEntry.word,'US')">美音 <i class="fa-solid fa-volume-high"></i></button>
        <span>/{{ currentEntry.phonetic || '—' }}/</span>
        <button type="button" class="pill" @click="speak(currentEntry.word,'UK')">英音 <i class="fa-solid fa-volume-high"></i></button>
      </div>
      <p class="hint-text" style="text-align:center">先回想词义，再判断熟悉度</p>
      <div class="row-btns" style="margin-top:24px">
        <button class="btn btn-success" @click="onMeta('know')">认识</button>
        <button class="btn btn-warn" @click="onMeta('unsure')">不确定</button>
        <button class="btn btn-danger-soft" @click="onMeta('unknown')">不认识</button>
      </div>
      <p v-if="hintLevel>=1" class="hint-text" style="text-align:center">提示例句：{{ exampleSentence }}</p>
    </template>

    <template v-if="view==='unk' && currentEntry">
      <div class="nav-bar">
        <button class="nav-btn" type="button" @click="confirmLeaveStudy"><i class="fa-solid fa-chevron-left"></i></button>
        <span>释义</span>
        <span style="width:48px"></span>
      </div>
      <div class="word-head">{{ currentEntry.word }}</div>
      <div class="phon-row">
        <button type="button" class="pill" @click="speak(currentEntry.word,'US')">美 /{{ currentEntry.phonetic || '—' }}/ <i class="fa-solid fa-volume-high"></i></button>
        <button type="button" class="pill" @click="speak(currentEntry.word,'UK')">英 <i class="fa-solid fa-volume-high"></i></button>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="tag on" style="display:inline-block;margin-bottom:10px">全部释义</div>
        <div v-for="(line,idx) in (currentEntry.translation||'').split('\n').filter(Boolean)" :key="idx" style="margin-bottom:6px;font-size:15px">{{ line }}</div>
        <div v-if="currentEntry.definition" class="small" style="margin-top:10px">英文：{{ currentEntry.definition }}</div>
      </div>
      <div class="card">
        <div class="ex-en" v-html="highlightExample"></div>
        <div class="ex-zh">{{ exampleTranslation }}</div>
        <img v-if="feedbackImage" :src="feedbackImage" class="img-ph" alt="" />
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" type="button" @click="afterUnknownCard">进入听音拼写</button>
    </template>

    <!-- QUIZ -->
    <template v-if="view==='quiz' && currentEntry && quiz">
      <div class="nav-bar">
        <button class="nav-btn" type="button" @click="confirmLeaveStudy"><i class="fa-solid fa-chevron-left"></i></button>
        <span>{{ sessionIndex + 1 }} / {{ sessionQueue.length }} · {{ quizModeLabel }}</span>
        <div class="toolbar-icons">
          <button type="button" @click="toggleStar(currentEntry.word)"><i :class="isStarred(currentEntry.word)?'fa-solid fa-star':'fa-regular fa-star'"></i></button>
          <button type="button" @click="showHint"><i class="fa-regular fa-lightbulb"></i></button>
          <button type="button" @click="speak(currentEntry.word, settings.accent)"><i class="fa-solid fa-volume-high"></i></button>
        </div>
      </div>
      <template v-if="quiz.type==='word2zh'">
        <div class="word-head" style="text-align:center">{{ currentEntry.word }}</div>
        <div class="phon-row" style="justify-content:center">
          <button type="button" class="pill" @click="speak(currentEntry.word, settings.accent)">{{ settings.accent==='US'?'美':'英' }} <i class="fa-solid fa-volume-high"></i></button>
          <span>/{{ currentEntry.phonetic || '—' }}/</span>
        </div>
        <p class="hint-text" style="text-align:center">选择正确中文释义</p>
        <button v-for="(o,i) in quiz.options" :key="i" type="button" class="choice" :class="choiceClass(i)" @click="pickChoice(i)" :disabled="quiz.locked">
          <div class="pos">{{ o.pos }}</div>
          <div>{{ o.text }}</div>
        </button>
      </template>
      <template v-else-if="quiz.type==='zh2word'">
        <div style="text-align:center;font-size:18px;margin:16px 0;line-height:1.5">{{ quiz.zhPrompt }}</div>
        <p class="hint-text" style="text-align:center">选择对应英文</p>
        <button v-for="(o,i) in quiz.options" :key="i" type="button" class="choice" :class="choiceClass(i)" @click="pickChoice(i)" :disabled="quiz.locked">
          <div style="font-weight:700">{{ o.word }}</div>
        </button>
      </template>
      <template v-else-if="quiz.type==='listen2zh'">
        <div style="text-align:center;margin:24px 0">
          <button class="btn btn-primary" type="button" @click="speak(currentEntry.word, settings.accent)"><i class="fa-solid fa-headphones"></i> 播放发音</button>
        </div>
        <p class="hint-text" style="text-align:center">听音选择中文释义</p>
        <button v-for="(o,i) in quiz.options" :key="i" type="button" class="choice" :class="choiceClass(i)" @click="pickChoice(i)" :disabled="quiz.locked">
          <div class="pos">{{ o.pos }}</div>
          <div>{{ o.text }}</div>
        </button>
      </template>
      <template v-else-if="quiz.type==='spell'">
        <div style="text-align:center;margin:12px 0">
          <button class="btn btn-ghost" type="button" @click="speak(currentEntry.word, settings.accent)">再听一遍</button>
        </div>
        <p class="hint-text" style="text-align:center">听音拼写（可提示首字母）</p>

        translation: it >= 0 ? row[it] : '',
        exchange: ix >= 0 ? row[ix] : '',
        pos: ipos >= 0 ? row[ipos] : '',
        synonyms: isy >= 0 ? row[isy] : '',
        rootAffix: ira >= 0 ? row[ira] : ''
      });
    }
    return out;
  }

  function firstSense(translation) {
    if (!translation) return { pos: '', text: '' };
    const lines = translation.split(/\n/).map((l) => l.trim()).filter(Boolean);
    const line = lines[0] || '';
    const m = line.match(/^([a-z]+\.)\s*(.+)$/i);
    if (m) return { pos: m[1], text: m[2] };
    return { pos: '释义', text: line };
  }

  function allSenses(translation) {
    if (!translation) return [];
    return translation.split(/\n/).map((l) => l.trim()).filter(Boolean).map((line) => {
      const m = line.match(/^([a-z]+\.)\s*(.+)$/i);
      if (m) return { pos: m[1], text: m[2] };
      return { pos: '', text: line };
    });
  }

  function fakeExample(word) {
    const w = word;
    return {
      en: `The teacher is happy when her students **${w}** in class discussions.`,
      zh: `当学生们能在课堂讨论中做到与「${w}」相关的行为时，老师会很高兴。（示意例句）`
    };
  }

  function buildLexiconMap(entries) {
    const m = new Map();
    entries.forEach((e) => m.set(normWord(e.word), e));
    return m;
  }

  /** @param {{ words?: [string, string][] }} pack */
  function entriesFromCetPack(pack) {
    const pairs = pack.words || [];
    return pairs.map(([word, translation]) => ({
      word,
      translation,
      phonetic: '',
      definition: '',
      exchange: '',
      pos: '',
      synonyms: '',
      rootAffix: ''
    }));
  }

  function pickDistractors(target, pool, lexicon, n) {
    const t = target.word;
    const senses = allSenses(target.translation);
    const used = new Set([normWord(t)]);
    const out = [];
    const candidates = pool.filter((w) => w !== t && !sameRootish(w, t));
    for (let k = 0; k < candidates.length && out.length < n; k++) {
      const w = candidates[k];
      const nw = normWord(w);
      if (used.has(nw)) continue;
      const ent = lexicon.get(nw);
      if (!ent) continue;
      const bad = senses.some((s) => ent.translation && ent.translation.includes(s.text.slice(0, 6)));
      if (bad) continue;
      used.add(nw);
      out.push(ent);
    }
    let i = 0;
    while (out.length < n && i < pool.length) {
      const w = pool[i++];
      const nw = normWord(w);
      if (used.has(nw)) continue;
      const ent = lexicon.get(nw);
      if (!ent) continue;
      if (sameRootish(w, t)) continue;
      used.add(nw);
      out.push(ent);
      if (out.length >= n) break;
    }
    return out;
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function fetchJSON(url, timeoutMs) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), timeoutMs || 8000);
    return fetch(url, { signal: ctrl.signal })
      .then((r) => r.json())
      .finally(() => clearTimeout(t));
  }

  function parseHzImage(j) {
    if (!j || typeof j !== 'object') return '';
    const cand = j.img || j.pic || j.url || j.image || j.link;
    if (typeof cand === 'string' && /^https?:\/\//i.test(cand)) return cand;
    if (j.data) {
      const d = j.data;
      if (typeof d === 'string' && /^https?:\/\//i.test(d)) return d;
      if (Array.isArray(d) && d[0]) {
        const x = d[0];
        if (typeof x === 'string') return x;
        if (x && typeof x === 'object') return x.url || x.img || x.pic || '';
      }
      if (d && typeof d === 'object') return d.url || d.img || d.pic || '';
    }
    return '';
  }

        clearTimeout(metaTimer.value);
        hintLevel.value = 0;
        metaTimer.value = setTimeout(() => { if (view.value === 'learn') hintLevel.value = 1; }, 5000);
      }

      function resetHints() {
        hintLevel.value = 0;
        hintImage.value = '';
        spellInput.value = '';
        spellHinted.value = false;
        quiz.value = null;
        lastResult.value = null;
      }

      function maybeAutoSpeak() {
        nextTick(() => {
          if (!state.value.settings.autoSpeak) return;
          const e = currentEntry.value;
          if (e && (view.value === 'learn' || view.value === 'quiz')) speak(e.word, state.value.settings.accent);
        });
      }

      function speak(text, accent) {
        try {
          const t = String(text || '').trim();
          if (!t) return;
          if (typeof speechSynthesis !== 'undefined' && speechSynthesis.resume) {
            try { speechSynthesis.resume(); } catch (_) {}
          }
          const u = new SpeechSynthesisUtterance(t);
          u.lang = accent === 'UK' ? 'en-GB' : 'en-US';
          u.rate = 0.92;
          speechSynthesis.cancel();
          speechSynthesis.speak(u);
        } catch (_) {
          showToast('无法朗读（请再点一次发音按钮，或检查系统是否关闭 TTS）');
        }
      }

      function toggleStar(word) {
        const k = normWord(word);
        if (state.value.starred[k]) delete state.value.starred[k];
        else state.value.starred[k] = true;
        const pr = getProgress(word);
        pr.familiar = !!state.value.starred[k];
        persist();
      }

      function isStarred(word) {
        return !!state.value.starred[normWord(word)];
      }

      function onMeta(kind) {
        clearTimeout(metaTimer.value);
        metaChoice.value = kind;
        uncertain.value = kind === 'unsure';
        const e = currentEntry.value;
        if (kind === 'unknown') {
          uncertain.value = false;
          detailEntry.value = e;
          detailHighlightIdx.value = 0;
          noteDraft.value = state.value.notes[normWord(e.word)] || '';
          feedbackImage.value = placeholderImg();
          fetchImageFor(e.word).then((u) => { feedbackImage.value = u; });
          view.value = 'unk';
          maybeAutoSpeak();
          return;
        }
        resetHints();
        view.value = 'quiz';
        if (kind === 'know') {
          if (sessionReviewAlternate.value) buildQuiz('zh2word');
          else buildQuiz('word2zh');
        } else if (kind === 'unsure') {
          if (sessionReviewAlternate.value) buildQuiz('listen2zh');
          else buildNextQuizType();
        } else buildNextQuizType();
        scheduleMetaHint();
        maybeAutoSpeak();
      }

      function afterUnknownCard() {
        bumpStats('learn');
        persist();
        resetHints();
        view.value = 'quiz';
        buildQuiz('spell');
        maybeAutoSpeak();
      }

      function buildNextQuizType() {
        const e = currentEntry.value;
        const mode = state.value.settings.masteryMode;
        const roll = Math.random();
        if (mode === 'dictation') {
          buildQuiz(roll < 0.85 ? 'spell' : 'word2zh');
          return;
        }
        if (mode === 'cognitive') {
          const pool = ['word2zh', 'zh2word', 'multisense'];
          buildQuiz(pool[(roll * pool.length) | 0]);
          return;
        }
        const pool = ['word2zh', 'zh2word', 'multisense', 'listen2zh', 'spell'];
        buildQuiz(pool[(roll * pool.length) | 0]);
      }

      function buildQuiz(type) {
        const e = currentEntry.value;
        const poolWords = shuffle(Array.from(lexicon.value.keys()));
        const distractors = pickDistractors(e, poolWords, lexicon.value, 3);
        const correctSense = firstSense(e.translation);
        if (type === 'word2zh' || type === 'listen2zh') {
          const opts = shuffle([
            { pos: correctSense.pos || '释义', text: correctSense.text, ok: true },
            ...distractors.map((d) => {
              const s = firstSense(d.translation);
              return { pos: s.pos || '释义', text: s.text, ok: false };
            })
          ]);
          quiz.value = { type, options: opts, locked: false, picked: null, wrongStreak: 0 };
        } else if (type === 'zh2word') {
          const opts = shuffle([
            { word: e.word, ok: true },
            ...distractors.map((d) => ({ word: d.word, ok: false }))
          ]);
          quiz.value = {
            type,
            zhPrompt: `${correctSense.pos || ''} ${correctSense.text}`.trim(),
            options: opts,
            locked: false,
            picked: null,
            wrongStreak: 0
          };
        } else if (type === 'multisense') {
          const senses = allSenses(e.translation);
          const nCor = Math.min(2, Math.max(1, senses.length));
          const correct = senses.slice(0, nCor);
          const needFake = Math.min(4 - correct.length, distractors.length);
          const fake = distractors.slice(0, needFake).map((d) => firstSense(d.translation));
          const opts = shuffle([
            ...correct.map((s) => ({ pos: s.pos, text: s.text, ok: true })),
            ...fake.map((s) => ({ pos: s.pos || '释义', text: s.text, ok: false }))
          ]);
          quiz.value = { type, options: opts, locked: false, pickedMulti: [] };
        } else if (type === 'spell') {
          quiz.value = { type, locked: false };
        }
      }

      function showHint() {
        if (hintLevel.value < 1) hintLevel.value = 1;
        else if (hintLevel.value < 2) {
          hintLevel.value = 2;
          loadHintImage();
        } else speak(currentEntry.value.word, state.value.settings.accent);
      }

      function loadHintImage() {
        const w = currentEntry.value && currentEntry.value.word;
        if (!w) return;
        apiLoading.value = true;
        const url = `https://api.apihz.cn/getapi.php?id=88888888&key=88888888&keyword=${encodeURIComponent(w)}&num=1`;
        fetchJSON(url, 6000)
          .then((j) => {
            const u = parseHzImage(j);
            hintImage.value = u || placeholderImg();
          })
          .catch(() => { hintImage.value = placeholderImg(); })
          .finally(() => { apiLoading.value = false; });
      }

      function placeholderImg() {
        return 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200"><rect fill="#e8e0dc" width="100%" height="100%"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#999" font-size="18">${APP_NAME}</text></svg>`);
      }

      function fetchImageFor(word) {
        const url = `https://api.apihz.cn/getapi.php?id=88888888&key=88888888&keyword=${encodeURIComponent(word)}&num=1`;
        return fetchJSON(url, 6000)
          .then((j) => {
            const u = parseHzImage(j);
            return u || placeholderImg();
          })
          .catch(() => placeholderImg());
      }

      function ensureWrongBookEntry(e, bumpCount) {
        const wk = normWord(e.word);
        if (!state.value.wrongBook[wk]) {
          state.value.wrongBook[wk] = { wrongCount: 0, correctStreak: 0, translation: e.translation, display: e.word };
        }
        if (bumpCount) state.value.wrongBook[wk].wrongCount++;
      }

      function openDetailAfterThreeStrikes() {
        const e = currentEntry.value;
        if (!e) return;
        ensureWrongBookEntry(e, true);
        const pr = getProgress(e.word);
        pr.consecutiveWrong = (pr.consecutiveWrong || 0) + 1;
        detailEntry.value = e;
        detailTab.value = 'def';
        detailHighlightIdx.value = 0;
        noteDraft.value = state.value.notes[normWord(e.word)] || '';
        detailReturnView.value = 'quiz';
        detailFromStrikes.value = true;
        detailScreenImage.value = placeholderImg();
        fetchImageFor(e.word).then((u) => { detailScreenImage.value = u; });
        view.value = 'detail';
        persist();
      }

      function continueQuizSameWord() {
        detailFromStrikes.value = false;
        detailScreenImage.value = '';
        detailReturnView.value = null;
        view.value = 'quiz';
        resetHints();
        if (sessionReviewAlternate.value && metaChoice.value === 'know') buildQuiz('zh2word');
        else if (sessionReviewAlternate.value && metaChoice.value === 'unsure') buildQuiz('listen2zh');
        else if (metaChoice.value === 'know') buildQuiz('word2zh');
        else if (metaChoice.value === 'unsure') buildNextQuizType();
        else buildQuiz('word2zh');
        maybeAutoSpeak();
      }

      function nextWordFromDetail() {
        detailFromStrikes.value = false;
        detailScreenImage.value = '';
        const ret = detailReturnView.value;
        detailReturnView.value = null;
        if (ret === 'feedback') {
          nextAfterFeedback();
          return;
        }
        if (ret === 'quiz') {
          metaChoice.value = null;
          uncertain.value = false;
          if (sessionIndex.value < sessionQueue.value.length - 1) {
            sessionIndex.value++;
            view.value = 'learn';
            resetHints();
            scheduleMetaHint();
            maybeAutoSpeak();
          } else {
            sessionReviewAlternate.value = false;
            view.value = 'home';
          }
          return;
        }
        if (sessionIndex.value < sessionQueue.value.length - 1) {
          sessionIndex.value++;
          metaChoice.value = null;
          uncertain.value = false;
          view.value = 'learn';
          resetHints();
          scheduleMetaHint();
          maybeAutoSpeak();
        } else {
          view.value = 'home';
        }
      }

      function choiceClass(i) {
        if (!quiz.value || quiz.value.locked === false) return {};
        const o = quiz.value.options[i];
        const picked = quiz.value.picked === i;
        return {
          right: o.ok,
          wrong: picked && !o.ok,
          selected: picked || (o.ok && quiz.value.locked)
        };
      }

      function multiClass(i) {
        if (!quiz.value) return {};
        const arr = quiz.value.pickedMulti || [];
        return { selected: arr.includes(i) };
      }

      function toggleMulti(i) {
        if (!quiz.value || quiz.value.locked) return;
        const arr = quiz.value.pickedMulti || [];
        const j = arr.indexOf(i);
        if (j >= 0) arr.splice(j, 1);
        else arr.push(i);
        quiz.value.pickedMulti = arr.slice();
      }

      function pickChoice(i) {
        if (!quiz.value || quiz.value.locked) return;
        const qz = quiz.value;
        const t = qz.type;
        const o = qz.options[i];
        const ok = o.ok;
        const fourChoice = t === 'word2zh' || t === 'zh2word' || t === 'listen2zh';
        if (!fourChoice) {
          qz.picked = i;
          qz.locked = true;
          finishQuiz(ok, qz.options.find((x) => x.ok));
          return;
        }
        if (ok) {
          qz.picked = i;
          qz.locked = true;
          finishQuiz(true, o);
          return;
        }
        qz.wrongStreak = (qz.wrongStreak || 0) + 1;
        qz.picked = i;
        qz.locked = true;
        if (qz.wrongStreak >= 3) {
          openDetailAfterThreeStrikes();
          return;
        }
        setTimeout(() => {
          if (!quiz.value || quiz.value !== qz) return;
          qz.locked = false;
          qz.picked = null;
        }, 700);
      }

      function submitMulti() {
        if (!quiz.value || quiz.value.locked) return;
        const correctIdx = quiz.value.options.map((o, idx) => (o.ok ? idx : -1)).filter((x) => x >= 0);
        const picked = quiz.value.pickedMulti || [];
        const ok = correctIdx.length && correctIdx.every((idx) => picked.includes(idx)) && picked.length === correctIdx.length;
        quiz.value.locked = true;
        finishQuiz(ok, { text: '所有正确义项' });
      }

      function submitSpell() {
        if (!quiz.value || quiz.value.locked) return;
        const w = normWord(spellInput.value);
        const ok = w === normWord(currentEntry.value.word);
        quiz.value.locked = true;
        finishQuiz(ok, { text: currentEntry.value.word });
      }

      function spellHintFirst() {
        spellHinted.value = true;
      }

      function finishQuiz(correct, expected) {
        const e = currentEntry.value;
        const pr = getProgress(e.word);
        const d = todayISO();
        const prevOk = pr.lastResult === 'ok';
        const dueForgot = (pr.nextDue || d) <= d;
        pr.studyByDay[d] = (pr.studyByDay[d] || 0) + 1;
        lastResult.value = { correct, expected: expected && (expected.text || expected.word) };
        feedbackImage.value = placeholderImg();
        fetchImageFor(e.word).then((u) => { feedbackImage.value = u; });
        if (!correct) {
          pr.wrongByDay[d] = (pr.wrongByDay[d] || 0) + 1;
          pr.consecutiveWrong = (pr.consecutiveWrong || 0) + 1;
          const wk = normWord(e.word);
          if (!state.value.wrongBook[wk]) state.value.wrongBook[wk] = { wrongCount: 0, correctStreak: 0, translation: e.translation, display: e.word };
          state.value.wrongBook[wk].wrongCount++;
          state.value.wrongBook[wk].correctStreak = 0;
          if (prevOk && dueForgot && (pr.intervalIdx || 0) > 0) {
            state.value.wrongBook[wk].wrongCount++;
          }
          if (pr.consecutiveWrong >= 5) ensureWrongBookEntry(e, false);
          pr.intervalIdx = 0;
          pr.nextDue = d;
          pr.lastSpellWrongDay = d;
          pr.knowPassDays = [];
        } else {
          pr.consecutiveWrong = 0;
          const wk = normWord(e.word);
          const wb = state.value.wrongBook[wk];
          if (wb) {
            wb.correctStreak = (wb.correctStreak || 0) + 1;
            if (wb.correctStreak >= 2) delete state.value.wrongBook[wk];
          }
          if (!uncertain.value && metaChoice.value === 'know' && correct) {
            const arr = pr.knowPassDays || [];
            if (!arr.includes(d)) arr.push(d);
            pr.knowPassDays = arr.slice(-12);
            const uniqDays = [...new Set(arr)];
            if (uniqDays.length >= 2) pr.mastered = true;
          }
          if (!pr.mastered) {
            pr.intervalIdx = Math.min(INTERVALS.length - 1, (pr.intervalIdx || 0) + (uncertain.value ? 0 : 1));
            const days = INTERVALS[pr.intervalIdx] || 1;
            const dt = new Date();
            dt.setDate(dt.getDate() + days);
            pr.nextDue = dt.toISOString().slice(0, 10);
          }
        }
        pr.lastResult = correct ? 'ok' : 'bad';
        bumpStats('review');
        view.value = 'feedback';
        clearTimeout(metaTimer.value);
        persist();
      }

      function nextAfterFeedback() {
        const e = currentEntry.value;
        const minutes = (Date.now() - (studyStart.value || Date.now())) / 60000;
        addMinutes(Math.max(0.2, minutes / Math.max(1, sessionIndex.value + 1)));
        if (sessionIndex.value >= sessionQueue.value.length - 1) {
          const goal = state.value.settings.dailyGoal;
          const learned = todayLearned.value;
          const ok = learned >= goal;
          modalExitText.value = ok
            ? `🎉 真是充实的一天！你学习了约 ${Math.round(minutes)} 分钟，今日已完成目标。`
            : `💪 今日任务尚不达标，还有约 ${Math.max(0, goal - learned)} 个单词在等你。`;
          modalExit.value = true;
          window.__wwLeaveCb = () => {
            sessionReviewAlternate.value = false;
            view.value = 'home';
          };
          return;
        }
        sessionIndex.value++;
        metaChoice.value = null;
        uncertain.value = false;
        view.value = 'learn';
        resetHints();
        scheduleMetaHint();
        maybeAutoSpeak();
      }

      function tryMorningReview() {
        if (lexiconBundlesLoading.value) return;
        const t = todayISO();
        if (state.value.morningReviewPromptDate === t) return;
        const y = new Date();
        y.setDate(y.getDate() - 1);
        const yKey = y.toISOString().slice(0, 10);
        const heavy = [];
        lexicon.value.forEach((ent, k) => {
          if (!ent) return;
          const pr = getProgress(k);
          const n = pr.studyByDay[yKey] || 0;
          if (n >= 3) heavy.push(ent);
        });
        if (!heavy.length) return;
        state.value.morningReviewPromptDate = t;
        persist();
        sessionReviewAlternate.value = true;
        sessionMode.value = 'morning';
        metaChoice.value = null;
        uncertain.value = false;
        sessionQueue.value = shuffle(heavy).slice(0, Math.min(heavy.length, state.value.settings.dailyGoal || 20));
        sessionIndex.value = 0;
        studyStart.value = Date.now();
        view.value = 'learn';
        resetHints();
        scheduleMetaHint();
        showToast('昨日高强度单词：今日已切换题型复习');
        maybeAutoSpeak();
      }

      function openDetailFromFeedback() {
        detailEntry.value = currentEntry.value;
        detailTab.value = 'def';
        detailHighlightIdx.value = 0;
        noteDraft.value = state.value.notes[normWord(detailEntry.value.word)] || '';
        detailReturnView.value = 'feedback';
        detailFromStrikes.value = false;
        detailScreenImage.value = placeholderImg();
        fetchImageFor(detailEntry.value.word).then((u) => { detailScreenImage.value = u; });
        view.value = 'detail';
      }

      function closeDetail() {
        detailScreenImage.value = '';
        const ret = detailReturnView.value;
        detailReturnView.value = null;
        detailFromStrikes.value = false;
        if (ret === 'feedback') {
          view.value = 'feedback';
          return;
        }
        if (ret === 'quiz') {
          continueQuizSameWord();
          return;
        }
        view.value = sessionQueue.value.length ? 'learn' : 'home';
      }

      function saveNote() {
        if (!detailEntry.value) return;
        const k = normWord(detailEntry.value.word);
        state.value.notes[k] = noteDraft.value;
        persist();
      }

      function lookupQuick(w) {
        searchQ.value = w;
        runSearch();
        view.value = 'search';
      }

      function runSearch() {
        const q = normWord(searchQ.value);
        if (!q) return;
        searchError.value = '';
        searchResult.value = null;
        const local = lexicon.value.get(q);
        if (local) {
          searchResult.value = local;
          addTempSearch(q);
          return;
        }
        searchLoading.value = true;
        const url = `http://124.222.204.22/api/zici/fanyiapihz.php?id=88888888&key=88888888&word=${encodeURIComponent(q)}`;
        fetchJSON(url, 8000)
          .then((j) => {
            const zh = (j && (j.translation || j.data || j.result || j.msg)) || '';
            if (!zh) { searchError.value = '未找到释义'; return; }
            const ent = { word: q, phonetic: '', translation: String(zh), definition: '', exchange: '', pos: '', synonyms: '', rootAffix: '' };
            lexicon.value.set(q, ent);
            searchResult.value = ent;
            state.value.lexiconExtra.push(ent);
            addTempSearch(q);
            persist();
          })
          .catch(() => { searchError.value = '网络超时或接口不可用'; })
          .finally(() => { searchLoading.value = false; });
      }

      function addTempSearch(w) {
        const k = normWord(w);
        if (!state.value.tempWords.includes(k)) state.value.tempWords.push(k);
        persist();
      }

      function addNotebook(w) {
        const k = normWord(w);
        if (!state.value.notebook.includes(k)) state.value.notebook.push(k);
        persist();
        showToast('已加入生词本');
      }

      function exportWrong(mode) {
        const rows = wrongList.value;
        const esc = (s) => String(s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const m = mode || 'both';
        let head;
        let body;
        if (m === 'en') {
          head = '<tr><th>英文</th></tr>';
          body = rows.map((r) => `<tr><td>${esc(r.word)}</td></tr>`).join('');
        } else if (m === 'zh') {
          head = '<tr><th>中文释义</th></tr>';
          body = rows.map((r) => `<tr><td>${esc(r.translation)}</td></tr>`).join('');
        } else {
          head = '<tr><th>英文</th><th>释义</th><th>错误次数</th></tr>';
          body = rows.map((r) => `<tr><td>${esc(r.word)}</td><td>${esc(r.translation)}</td><td>${r.wrongCount}</td></tr>`).join('');
        }
        const html = `<!DOCTYPE html><html><head><meta charset="utf-8"/><title>${APP_NAME} 错题</title>
          <style>body{font-family:system-ui;padding:24px;}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:8px;text-align:left}</style></head><body>
          <h1>${APP_NAME} · 错题导出</h1><table>${head}${body}</table>
          <script>window.onload=function(){window.print()}<\/script></body></html>`;
        const w = window.open('', '_blank');
        if (w) { w.document.write(html); w.document.close(); }
        else showToast('请允许弹窗以导出');
      }

      function refreshStats() {
        showToast('数据已刷新');
      }

      function saveSettings() {
        persist();
        showToast('设置已保存');
        view.value = 'home';
      }

      function mergeLexicon(entries) {
        const m = new Map(lexicon.value);
        entries.forEach((e) => {
          const ent = {
            ...e,
            synonyms: e.synonyms != null ? e.synonyms : '',
            rootAffix: e.rootAffix != null ? e.rootAffix : ''
          };
          m.set(normWord(ent.word), ent);
          if (!state.value.lexiconExtra.find((x) => normWord(x.word) === normWord(ent.word))) state.value.lexiconExtra.push(ent);
        });
        lexicon.value = m;
        persist();
      }

      function onCsvFile(ev) {
        const f = ev.target.files && ev.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const rows = parseCSV(String(reader.result || ''));
            const ent = rowsToEntries(rows);
            mergeLexicon(ent);
            persist();
            showToast(`已导入 ${ent.length} 条`);
          } catch {
            showToast('CSV 解析失败');
          }
        };
        reader.readAsText(f, 'UTF-8');
      }

      onMounted(() => {
        const ex = state.value.lexiconExtra || [];
        if (ex.length) lexicon.value = buildLexiconMap(SAMPLE_LEXICON.concat(ex));
        lexiconBundlesLoading.value = true;
        Promise.all([
          fetchJSON('./data/lexicon-cet4.json', 90000),
          fetchJSON('./data/lexicon-cet6.json', 90000)
        ])
          .then(([p4, p6]) => {
            const e4 = entriesFromCetPack(p4);
            const e6 = entriesFromCetPack(p6);
            const m = new Map(lexicon.value);
            e4.forEach((ent) => { m.set(normWord(ent.word), ent); });
            e6.forEach((ent) => { m.set(normWord(ent.word), ent); });
            lexicon.value = m;
            if (p4 && p4.name) decks.cet4.name = p4.name;
            if (p6 && p6.name) decks.cet6.name = p6.name;
            decks.cet4.desc = '大学英语四级词库';
            decks.cet6.desc = '大学英语六级词库';
            const order4 = e4.map((x) => x.word);
            const order6 = e6.map((x) => x.word);
            decks.cet4.words = order4;
            decks.cet6.words = order6;
            const seen = new Set();
            const combo = [];
            for (const w of order4) {
              const k = normWord(w);
              if (!seen.has(k)) { seen.add(k); combo.push(w); }
            }
            for (const w of order6) {
              const k = normWord(w);
              if (!seen.has(k)) { seen.add(k); combo.push(w); }
            }
            decks.shuffle.desc = '四级+六级综合词库';
            decks.shuffle.words = combo;
          })
          .catch(() => {
            showToast('四六级词库文件加载失败，将使用内置示例');
            decks.cet4.desc = '内置示例词表（加载失败回退）';

            decks.shuffle.desc = '内置示例词表（加载失败回退）';
          })
          .finally(() => {
            lexiconBundlesLoading.value = false;
            try {
              const blob = new Blob([document.getElementById('wordwise-manifest-json').textContent], { type: 'application/json' });
              const u = URL.createObjectURL(blob);
              let link = document.querySelector('link[rel="manifest"]');
              if (!link) { link = document.createElement('link'); link.rel = 'manifest'; document.head.appendChild(link); }
              link.href = u;
            } catch (_) {}
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('wordwise-sw.js').catch(() => {});
            }
            tryMorningReview();
          });
      });
